<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harbor - Sign Up</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/effects.css">
<link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">

  <!-- Floating Petals -->
  <div class="petals" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-logo">Harbor</div>
        <p class="auth-subtitle">
          Create your account 🌸<br />
          Save resources and access support faster.
        </p>
      </div>

      <!-- JS handles submit, so no action/method -->
      <form id="registerForm" class="auth-form">

        <label class="sr-only" for="full_name">Full name</label>
        <input id="full_name" type="text" placeholder="Full name" required />

        <label class="sr-only" for="username">Username</label>
        <input id="username" type="text" placeholder="Username" required />

        <label class="sr-only" for="email">Email</label>
        <input id="email" type="email" placeholder="Email address" required />

        <label class="sr-only" for="password">Password</label>
        <input id="password" type="password" placeholder="Password" minlength="8" required />

        <label class="sr-only" for="confirm">Confirm password</label>
        <input id="confirm" type="password" placeholder="Confirm password" minlength="8" required />

        <p id="error" class="auth-error"></p>

        <button type="submit" class="primary-btn full-width">Sign Up</button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>

    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
