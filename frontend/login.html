<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harbor - Log In</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/effects.css">
<link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">

  <div class="petals" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">Harbor</div>
        <p class="auth-subtitle">
          Welcome back 🌿<br />
          Log in to continue accessing support.
        </p>
      </div>

      <form id="loginForm" class="auth-form">
        <label class="sr-only" for="email">Email</label>
        <input id="email" type="email" placeholder="Email address" required />

        <label class="sr-only" for="password">Password</label>
        <input id="password" type="password" placeholder="Password" required />

        <p id="error" class="auth-error"></p>

        <button type="submit" class="primary-btn full-width">Log In</button>
      </form>

      <div class="auth-links">
        <span class="auth-muted">Forgot password? Contact your support advisor.</span>
      </div>

      <p class="auth-footer">
        Don’t have an account?
        <a href="register.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
